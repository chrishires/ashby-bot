name: Poll Ashby Jobs

on:
  schedule:
    - cron: "7 */3 * * *"  # every 3 hours
  workflow_dispatch:

permissions:
  contents: read

jobs:
  poll:
    runs-on: ubuntu-latest
    env:
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      ALERT_TO: ${{ secrets.ALERT_TO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state_seen.json
          key: state-seen-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            state-seen-${{ runner.os }}-

      - name: Remove test job from state
        run: |
          python3 -c "
          import json
          with open('state_seen.json') as f:
              data = json.load(f)
          data['seen'] = [k for k in data['seen'] if 'url:https://jobs.ashbyhq.com/suno/4bf71557-1cb1-4722-88ec-e401adc0b75a' not in k]
          with open('state_seen.json', 'w') as f:
              json.dump({'seen': sorted(data['seen'])}, f, indent=2)
          "

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Poll + email
        run: |
          python scripts/poll_and_email.py